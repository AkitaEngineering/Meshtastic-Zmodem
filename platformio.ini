; PlatformIO Configuration (created from example)
[platformio]
default_envs = esp32dev

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
board_build.filesystem = spiffs

lib_deps =
    ; Meshtastic Core (Required)
    meshtastic/Meshtastic @ ^2.3.9
    
    ; Utility (Optional, check if needed by main firmware)
    bblanchon/ArduinoStreamUtils
    
    ; NO EXTERNAL ZMODEM LIB REQUIRED (Built-in)

    ; Akita Library
    symlink://.

build_flags =
    -D CONFIG_MESHTASTIC_DEBUG_SERIAL
    -D AKZ_ZMODEM_COMMAND_PORTNUM=250
    -D AKZ_ZMODEM_DATA_PORTNUM=251

[env:esp32dev]
board = esp32dev
